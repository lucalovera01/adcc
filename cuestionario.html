<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuestionario Básico: Cimientos de Audio</title>
    <style>
        :root {
            --bg-main: #0b0f19;
            --bg-card: #131a2c;
            --bg-feedback-correct: rgba(16, 185, 129, 0.15);
            --bg-feedback-incorrect: rgba(244, 63, 94, 0.15);
            --border: #24324f;
            --cyan: #06b6d4;
            --emerald: #10b981;
            --rose: #f43f5e;
            --amber: #f59e0b;
            --text-light: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .quiz-window {
            background-color: var(--bg-card);
            border: 2px solid var(--border);
            border-radius: 16px;
            width: 100%;
            max-width: 700px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
        }

        .quiz-window::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--cyan), var(--emerald));
        }

        header {
            margin-bottom: 25px;
            text-align: center;
        }

        header h1 {
            font-size: 1.6rem;
            font-weight: 800;
            color: #ffffff;
            margin-bottom: 5px;
        }

        header h1 span {
            color: var(--emerald);
        }

        header p {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .meta-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .question-number {
            color: var(--cyan);
            background-color: rgba(6, 182, 212, 0.1);
            padding: 4px 12px;
            border-radius: 20px;
        }

        .score-live {
            color: var(--amber);
        }

        .progress-container {
            width: 100%;
            background-color: #090d16;
            height: 6px;
            border-radius: 10px;
            margin-bottom: 35px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--cyan), var(--emerald));
            transition: width 0.3s ease;
        }

        .question-wrapper {
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 35px;
        }

        .question-text {
            font-size: 1.2rem;
            line-height: 1.5;
            text-align: center;
            font-weight: 500;
            color: #f1f5f9;
        }

        .actions-layout {
            display: flex;
            gap: 20px;
            margin-bottom: 25px;
        }

        .btn-choice {
            flex: 1;
            border: none;
            padding: 16px;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #020617;
            text-transform: uppercase;
        }

        .btn-true { background-color: var(--emerald); }
        .btn-true:hover:not(:disabled) { background-color: #059669; transform: translateY(-2px); }

        .btn-false { background-color: var(--rose); }
        .btn-false:hover:not(:disabled) { background-color: #e11d48; transform: translateY(-2px); }

        .btn-choice:disabled {
            opacity: 0.2;
            cursor: not-allowed;
            transform: none !important;
        }

        .feedback-panel {
            display: none;
            border-radius: 10px;
            padding: 18px;
            margin-bottom: 25px;
            border: 1px solid transparent;
            font-size: 0.95rem;
        }

        .feedback-panel.correct {
            display: block;
            background-color: var(--bg-feedback-correct);
            border-color: var(--emerald);
            color: #a7f3d0;
        }

        .feedback-panel.incorrect {
            display: block;
            background-color: var(--bg-feedback-incorrect);
            border-color: var(--rose);
            color: #fecdd3;
        }

        .feedback-title {
            font-weight: 700;
            margin-bottom: 5px;
        }

        .btn-next {
            display: none;
            width: 100%;
            background-color: #1e293b;
            color: var(--text-light);
            border: 1px solid var(--border);
            padding: 14px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
        }
        .btn-next:hover { background-color: #334155; }

        .summary-layout {
            display: none;
            text-align: center;
        }

        .summary-layout h2 {
            font-size: 1.8rem;
            color: var(--amber);
            margin-bottom: 15px;
        }

        .score-badge {
            font-size: 3.5rem;
            font-weight: 800;
            color: #ffffff;
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.03);
            display: inline-block;
            padding: 10px 35px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .btn-reset {
            background-color: var(--cyan);
            color: #000;
            border: none;
            padding: 14px 28px;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer;
        }
        .btn-reset:hover { background-color: #22d3ee; }
    </style>
</head>
<body>

    <div class="quiz-window">
        
        <div id="game-stage">
            <header>
                <h1>Repaso <span>Fácil</span></h1>
                <p>Conceptos Básicos de Audio y Acústica</p>
            </header>

            <div class="meta-panel">
                <span id="ui-current-index" class="question-number">Pregunta 0 de 0</span>
                <span class="score-live">Aciertos: <span id="ui-live-score">0</span></span>
            </div>

            <div class="progress-container">
                <div id="ui-progress-bar" class="progress-bar"></div>
            </div>

            <div class="question-wrapper">
                <p id="ui-question-text" class="question-text">Cargando preguntas básicas...</p>
            </div>

            <div class="actions-layout">
                <button class="btn-choice btn-true" onclick="evaluateAnswer(true)">Verdadero</button>
                <button class="btn-choice btn-false" onclick="evaluateAnswer(false)">Falso</button>
            </div>

            <div id="ui-feedback-box" class="feedback-panel">
                <div id="ui-feedback-title" class="feedback-title">Resultado</div>
                <div id="ui-feedback-desc">Explicación.</div>
            </div>

            <button id="ui-next-btn" class="btn-next" onclick="nextQuestion()">Siguiente Pregunta →</button>
        </div>

        <div id="results-stage" class="summary-layout">
            <h2>¡Cuestionario Completado!</h2>
            <p style="color: var(--text-muted); margin-bottom: 15px;">Tu puntaje fue de:</p>
            <div id="ui-final-score" class="score-badge">0 / 10</div>
            <p id="ui-final-comment" style="margin-bottom: 30px; color: #cbd5e1; line-height: 1.5;"></p>
            <button class="btn-reset" onclick="startQuiz()">Volver a Jugar</button>
        </div>

    </div>

    <script>
        // Banco de 15 preguntas sencillas
        const basicQuestionsPool = [
            {
                text: "El oído humano joven y sano puede escuchar sonidos entre los 20 Hz y los 20.000 Hz.",
                answer: true,
                explanation: "¡Verdadero! Ese es el rango de frecuencias audibles estándar para los seres humanos."
            },
            {
                text: "Un filtro Pasa-Altos (HPF) corta los sonidos agudos y deja pasar únicamente los graves.",
                answer: false,
                explanation: "¡Falso! Al revés: el Pasa-Altos deja pasar los agudos (altos) y elimina los graves molestos."
            },
            {
                text: "El proceso de muestreo (sampling) toma capturas de la señal en el eje del tiempo.",
                answer: true,
                explanation: "¡Verdadero! Muestrear es tomar muestras a intervalos regulares de tiempo (como 44.100 veces por segundo)."
            },
            {
                text: "La velocidad del sonido en el aire es de aproximadamente 340 metros por segundo.",
                answer: true,
                explanation: "¡Verdadero! Es la velocidad promedio a la que viaja el sonido en condiciones normales de temperatura."
            },
            {
                text: "Subir los bits de grabación (de 16 a 24 bits) permite capturar frecuencias más altas.",
                answer: false,
                explanation: "¡Falso! Los bits manejan la precisión del volumen y el rango dinámico. Las frecuencias las maneja el muestreo."
            },
            {
                text: "En el eco podemos escuchar las repeticiones del sonido de forma separada y clara.",
                answer: true,
                explanation: "¡Verdadero! A diferencia de la reverberación, el eco tiene suficiente retraso como para que el cerebro note cada repetición por separado."
            },
            {
                text: "Para que dos o más pistas suenen juntas en un programa de audio (DAW), el software realiza una suma matemática de sus señales.",
                answer: true,
                explanation: "¡Verdadero! Mezclar canales de audio equivale a sumar sus amplitudes instantáneas."
            },
            {
                text: "Un ecualizador sirve para modificar el volumen de zonas específicas del espectro de frecuencias (como graves o agudos).",
                answer: true,
                explanation: "¡Verdadero! Te permite retocar el timbre dándole más o menos ganancia a ciertas frecuencias."
            },
            {
                text: "El Teorema de Nyquist dice que la frecuencia de muestreo debe ser al menos la mitad de la frecuencia más alta que queremos grabar.",
                answer: false,
                explanation: "¡Falso! Exige que sea el DOBLE de la frecuencia más alta para evitar distorsiones (aliasing)."
            },
            {
                text: "Las conexiones de inserción (inserts) se usan para enviar el 100% de la señal a un procesador conectado en serie (como un compresor).",
                answer: true,
                explanation: "¡Verdadero! El insert corta el camino del canal para que toda la señal pase obligatoriamente por el efecto."
            },
            {
                text: "Las frecuencias graves tienen ciclos por segundo (Hz) más altos que las frecuencias agudas.",
                answer: false,
                explanation: "¡Falso! Los graves son frecuencias bajas (pocos Hz, ej: 60 Hz), mientras que los agudos son frecuencias altas (muchos Hz, ej: 10.000 Hz)."
            },
            {
                text: "La reverberación está compuesta por muchísimas reflexiones del sonido tan juntas que el cerebro no las puede separar.",
                answer: true,
                explanation: "¡Verdadero! Es el rebote continuo en las paredes que genera esa sensación de espacio o sala."
            },
            {
                text: "Un cable de audio desenchufado que genera zumbido está metiendo interferencia o ruido al sistema.",
                answer: true,
                explanation: "¡Verdadero! Los ruidos eléctricos e inducciones externos ensucian la señal útil de audio."
            },
            {
                text: "El botón de Solo (S) en una pista sirve para silenciar ese canal y escuchar todo lo demás.",
                answer: false,
                explanation: "¡Falso! El botón 'Solo' hace que escuches únicamente esa pista, silenciando el resto de los canales."
            },
            {
                text: "Un afinador de guitarra mide la frecuencia fundamental de la cuerda para saber si está en la nota correcta.",
                answer: true,
                explanation: "¡Verdadero! Detecta los ciclos por segundo (Hz) de la nota para indicarte si está alta o baja."
            }
        ];

        let gameQuestions = [];
        let currentIndex = 0;
        let score = 0;

        function shuffle(array) {
            return array.sort(() => Math.random() - 0.5);
        }

        function startQuiz() {
            document.getElementById('results-stage').style.display = 'none';
            document.getElementById('game-stage').style.display = 'block';
            
            // Mezclar y elegir 10
            gameQuestions = shuffle([...basicQuestionsPool]).slice(0, 10);
            currentIndex = 0;
            score = 0;
            document.getElementById('ui-live-score').innerText = score;
            
            showQuestion();
        }

        function showQuestion() {
            const feedbackBox = document.getElementById('ui-feedback-box');
            feedbackBox.style.display = 'none';
            feedbackBox.className = 'feedback-panel';
            document.getElementById('ui-next-btn').style.display = 'none';
            
            document.querySelectorAll('.btn-choice').forEach(b => b.disabled = false);

            const q = gameQuestions[currentIndex];
            document.getElementById('ui-current-index').innerText = `Pregunta ${currentIndex + 1} de 10`;
            document.getElementById('ui-question-text').innerText = q.text;
            document.getElementById('ui-progress-bar').style.width = `${(currentIndex / 10) * 100}%`;
        }

        function evaluateAnswer(userChoice) {
            document.querySelectorAll('.btn-choice').forEach(b => b.disabled = true);
            
            const q = gameQuestions[currentIndex];
            const feedbackBox = document.getElementById('ui-feedback-box');
            const feedbackTitle = document.getElementById('ui-feedback-title');
            const feedbackDesc = document.getElementById('ui-feedback-desc');
            
            if (userChoice === q.answer) {
                score++;
                document.getElementById('ui-live-score').innerText = score;
                feedbackTitle.innerText = "¡CORRECTO!";
                feedbackBox.classList.add('correct');
            } else {
                feedbackTitle.innerText = "INCORRECTO";
                feedbackBox.classList.add('incorrect');
            }
            
            feedbackDesc.innerText = q.explanation;
            document.getElementById('ui-next-btn').style.display = 'block';
        }

        function nextQuestion() {
            currentIndex++;
            if (currentIndex < 10) {
                showQuestion();
            } else {
                document.getElementById('ui-progress-bar').style.width = '100%';
                setTimeout(showResults, 400);
            }
        }

        function showResults() {
            document.getElementById('game-stage').style.display = 'none';
            document.getElementById('results-stage').style.display = 'block';
            document.getElementById('ui-final-score').innerText = `${score} / 10`;
            
            const comment = document.getElementById('ui-final-comment');
            if (score >= 8) {
                comment.innerText = "¡Buenísimo! Tenés muy claros los conceptos fundamentales y las bases del sonido. ¡Estás listo para pasar al nivel avanzado!";
            } else if (score >= 6) {
                comment.innerText = "¡Bien aprobado! Agarraste bien la idea general, dale otra repasada para asegurar los puntos donde hubo dudas.";
            } else {
                comment.innerText = "Un tropezón no es caída. Algunos conceptos básicos se mezclaron. Volvé a jugar para fijar bien las bases.";
            }
        }

        window.onload = startQuiz;
    </script>
</body>
</html>
